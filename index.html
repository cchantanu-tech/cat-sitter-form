<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猫シッター事前情報フォーム</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* 1. 基本設定（スマホ用） */
    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Hiragino Kaku Gothic ProN, HiraKakuProN-W3, Arial, sans-serif;
      padding: 15px;
      line-height: 1.6;
      background: #f7f7f7;
      color: #333333; /* 文字色を確実に黒系に固定 */
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
    }

    /* 2. PDF化するエリアの設定 */
    #pdf-content {
      width: 100%;
      background: #ffffff !important; /* 背景色を白に強制 */
      padding: 20px;
      border-radius: 8px;
      box-sizing: border-box;
    }

    /* 文字が消えないよう、すべてのテキスト要素の色を明示 */
    h1, h2, p, label {
      color: #333333 !important;
      display: block;
    }

    h1 { font-size: 24px; margin-bottom: 10px; }
    h2 { 
      margin-top: 30px; 
      font-size: 18px;
      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 5px;
    }

    label {
      margin-top: 15px;
      font-weight: bold;
      font-size: 14px;
    }

    /* 3. フォーム要素の設定 */
    textarea, input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      font-family: inherit;
      border: 1px solid #cccccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 16px; /* iPhoneでのズーム防止 */
      background-color: #ffffff;
      color: #333333;
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    /* 4. ボタン（PDFには写らないようにする） */
    .btn-area {
      margin-top: 20px;
      margin-bottom: 50px;
    }

    button {
      display: block;
      width: 100%;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      background: #4CAF50;
      color: white !important;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    button:active {
      background: #439a46;
    }
  </style>
</head>

<body>

  <div class="container">
    
    <div id="pdf-content">
      <h1>🐾 猫シッター事前情報フォーム</h1>
      <p>必要項目を入力して、一番下のボタンを押してください。</p>

      <h2>① 基本プロフィール</h2>
      <label>名前（必須）<input id="name"></label>
      <label>年齢<input id="age"></label>
      <label>性格<textarea id="personality"></textarea></label>
      <label>生活リズム<textarea id="lifestyle"></textarea></label>

      <h2>② ごはん・水</h2>
      <label>フードの種類<textarea id="food"></textarea></label>
      <label>おやつの可否<textarea id="snack"></textarea></label>
      <label>水の置き場所<textarea id="water"></textarea></label>
      <label>NG食材<textarea id="ngfoods"></textarea></label>

      <h2>③ トイレ</h2>
      <label>トイレの場所<textarea id="toilet"></textarea></label>
      <label>砂の種類<textarea id="sand"></textarea></label>
      <label>片付け方<textarea id="cleaning"></textarea></label>
      <label>普段の状態<textarea id="condition"></textarea></label>

      <h2>④ 健康情報</h2>
      <label>持病・過去のトラブル<textarea id="health"></textarea></label>
      <label>投薬<textarea id="medicine"></textarea></label>
      <label>体調異変のサイン<textarea id="signs"></textarea></label>
      <label>かかりつけ病院<textarea id="hospital"></textarea></label>
      <label>緊急連絡先<textarea id="emergency"></textarea></label>

      <h2>⑤ 家のルール</h2>
      <label>入ってほしくない部屋<textarea id="rooms"></textarea></label>
      <label>脱走防止<textarea id="escape"></textarea></label>
      <label>家電の操作<textarea id="appliances"></textarea></label>

      <h2>⑥ 鍵の受け渡し方法</h2>
      <label>受け渡し方法<textarea id="key"></textarea></label>
      <label>返却方法<textarea id="key_return"></textarea></label>

      <h2>⑦ 連絡方法</h2>
      <label>連絡手段<textarea id="contact"></textarea></label>
      <label>報告の頻度<textarea id="report"></textarea></label>
    </div>

    <div class="btn-area">
      <button onclick="generatePDF()">PDFを作成して保存</button>
    </div>

  </div>

  <script>
    function generatePDF() {
      // 1. キーボードを閉じて入力を確定
      if (document.activeElement) {
        document.activeElement.blur();
      }

      // 2. 入力文字をHTMLに強制同期
      const inputs = document.querySelectorAll('#pdf-content input, #pdf-content textarea');
      inputs.forEach(input => {
        if (input.tagName.toLowerCase() === 'textarea') {
          input.textContent = input.value;
        } else {
          input.setAttribute('value', input.value);
        }
      });

      // 3. フォントの読み込み完了を待ってから処理（文字消え対策）
      document.fonts.ready.then(() => {
        const element = document.getElementById("pdf-content");

        // 一時的にスタイルをA4用の幅（794px）に固定してキャプチャ
        const originalWidth = element.style.width;
        const originalMaxWidth = element.style.maxWidth;
        element.style.width = '700px';
        element.style.maxWidth = '700px';

        const opt = {
          margin: [10, 10, 10, 10],
          filename: 'cat-sitter-info.pdf',
          pagebreak: { mode: ['avoid-all', 'css', 'legacy'] },
          html2canvas: {
            scale: 2,
            useCORS: true,
            scrollY: 0,
            windowWidth: 794 // 仮想ウィンドウ幅をA4相当に設定
          },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // 4. PDF生成
        html2pdf().set(opt).from(element).save().then(() => {
          // 元のレスポンシブ幅に戻す
          element.style.width = originalWidth;
          element.style.maxWidth = originalMaxWidth;
        }).catch(err => {
          console.error(err);
          element.style.width = originalWidth;
          element.style.maxWidth = originalMaxWidth;
        });
      });
    }
  </script>

</body>
</html>
