<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>猫シッター事前情報フォーム</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
    h2 { margin-top: 30px; }
    textarea, input { width: 100%; padding: 8px; margin-top: 5px; }
    button { padding: 12px 20px; margin-top: 20px; font-size: 16px; }
  </style>
</head>
<body>

  <h1>🐾 猫シッター事前情報フォーム</h1>
  <p>必要項目を入力して「PDFを作成」を押してください。</p>

  <!-- ① 基本プロフィール -->
  <h2>① 基本プロフィール</h2>
  <label>名前（必須）<input id="name"></label>
  <label>年齢<input id="age"></label>
  <label>性格<textarea id="personality"></textarea></label>
  <label>生活リズム<textarea id="lifestyle"></textarea></label>

  <!-- ② ごはん・水 -->
  <h2>② ごはん・水</h2>
  <label>フードの種類<textarea id="food"></textarea></label>
  <label>おやつの可否<textarea id="snack"></textarea></label>
  <label>水の置き場所<textarea id="water"></textarea></label>
  <label>NG食材<textarea id="ngfoods"></textarea></label>

  <!-- ③ トイレ -->
  <h2>③ トイレ</h2>
  <label>トイレの場所<textarea id="toilet"></textarea></label>
  <label>砂の種類<textarea id="sand"></textarea></label>
  <label>片付け方<textarea id="cleaning"></textarea></label>
  <label>普段の状態<textarea id="condition"></textarea></label>

  <!-- ④ 健康情報 -->
  <h2>④ 健康情報</h2>
  <label>持病・過去のトラブル<textarea id="health"></textarea></label>
  <label>投薬<textarea id="medicine"></textarea></label>
  <label>体調異変のサイン<textarea id="signs"></textarea></label>
  <label>かかりつけ病院<textarea id="hospital"></textarea></label>
  <label>緊急連絡先<textarea id="emergency"></textarea></label>

  <!-- ⑤ 家のルール -->
  <h2>⑤ 家のルール</h2>
  <label>入ってほしくない部屋<textarea id="rooms"></textarea></label>
  <label>脱走防止<textarea id="escape"></textarea></label>
  <label>家電の操作<textarea id="appliances"></textarea></label>

  <!-- ⑥ 鍵の受け渡し -->
  <h2>⑥ 鍵の受け渡し方法</h2>
  <label>受け渡し方法<textarea id="key"></textarea></label>
  <label>返却方法<textarea id="key_return"></textarea></label>

  <!-- ⑦ 連絡方法 -->
  <h2>⑦ 連絡方法</h2>
  <label>連絡手段<textarea id="contact"></textarea></label>
  <label>報告の頻度<textarea id="report"></textarea></label>

  <button onclick="generatePDF()">PDFを作成</button>

  <script>
    const { jsPDF } = window.jspdf;

    function generatePDF() {
      const doc = new jsPDF();
      let y = 10;

      function addSection(title, content) {
        doc.setFontSize(14);
        doc.text(title, 10, y);
        y += 8;

        doc.setFontSize(11);
        const lines = doc.splitTextToSize(content || "（未記入）", 180);
        doc.text(lines, 10, y);
        y += lines.length * 6 + 4;
      }

      addSection("① 基本プロフィール", 
        "名前: " + document.getElementById("name").value +
        "\n年齢: " + document.getElementById("age").value +
        "\n性格: " + document.getElementById("personality").value +
        "\n生活リズム: " + document.getElementById("lifestyle").value
      );

      addSection("② ごはん・水",
        "フード: " + document.getElementById("food").value +
        "\nおやつ: " + document.getElementById("snack").value +
        "\n水: " + document.getElementById("water").value +
        "\nNG食材: " + document.getElementById("ngfoods").value
      );

      addSection("③ トイレ",
        "場所: " + document.getElementById("toilet").value +
        "\n砂: " + document.getElementById("sand").value +
        "\n片付け方: " + document.getElementById("cleaning").value +
        "\n普段の状態: " + document.getElementById("condition").value
      );

      addSection("④ 健康情報",
        "持病: " + document.getElementById("health").value +
        "\n投薬: " + document.getElementById("medicine").value +
        "\n異変サイン: " + document.getElementById("signs").value +
        "\n病院: " + document.getElementById("hospital").value +
        "\n緊急連絡先: " + document.getElementById("emergency").value
      );

      addSection("⑤ 家のルール",
        "入ってほしくない部屋: " + document.getElementById("rooms").value +
        "\n脱走防止: " + document.getElementById("escape").value +
        "\n家電: " + document.getElementById("appliances").value
      );

      addSection("⑥ 鍵の受け渡し",
        "受け渡し方法: " + document.getElementById("key").value +
        "\n返却方法: " + document.getElementById("key_return").value
      );

      addSection("⑦ 連絡方法",
        "連絡手段: " + document.getElementById("contact").value +
        "\n報告頻度: " + document.getElementById("report").value
      );

      doc.save("cat-sitter-info.pdf");
    }
  </script>

</body>
</html>
